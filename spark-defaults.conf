########################################
# 🔥 Gluten + Velox
########################################
spark.plugins=org.apache.gluten.GlutenPlugin
spark.gluten.sql.columnar.backend=velox

########################################
# ⚙️ Memory
########################################
spark.memory.offHeap.enabled=true
spark.memory.offHeap.size=4g

########################################
# 🚀 Performance
########################################
spark.sql.execution.arrow.pyspark.enabled=true
spark.sql.columnVector.offheap.enabled=true
spark.sql.shuffle.partitions=200
spark.sql.adaptive.enabled=true

########################################
# 🧠 Cluster
########################################
spark.master=spark://spark-master:7077

########################################
# 🐝 Hive Metastore
########################################
spark.sql.catalogImplementation=hive
spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083

########################################
# 🧊 Iceberg (IMPORTANT)
########################################
spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.sql.catalog.spark_catalog=org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type=hive

########################################
# ☁️ MinIO (S3A)
########################################
spark.sql.warehouse.dir=s3a://warehouse/

spark.hadoop.fs.s3a.endpoint=http://minio:9000
spark.hadoop.fs.s3a.access.key=admin
spark.hadoop.fs.s3a.secret.key=password123
spark.hadoop.fs.s3a.path.style.access=true
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled=false

########################################
# 📦 Classpath
########################################
spark.driver.extraClassPath=/extra-jars/*
spark.executor.extraClassPath=/extra-jars/*